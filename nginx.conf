# Static site server block for Náttarklubbin → mounted at /etc/nginx/conf.d/default.conf
server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compress text assets (video/images are already compressed)
    gzip            on;
    gzip_vary       on;
    gzip_min_length 256;
    gzip_types      text/plain text/css application/javascript image/svg+xml;

    # HTML changes often → always revalidate
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # JS/CSS → short cache
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # Media/fonts → long cache (nginx serves mp4 with byte-range by default)
    location ~* \.(?:mp4|webm|jpe?g|png|webp|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
