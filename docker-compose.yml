version: "3.8"

# Two services:
#   web     – nginx, serves the static site
#   updater – runs the Instagram parser every UPDATE_INTERVAL_HOURS and writes
#             assets/events.json into the SHARED mounted volume, so updates go
#             live immediately with no rebuild. The parser fails soft on errors.
#
# assets/ is a bind mount → it is the live source of truth and survives rebuilds.

services:
  web:
    build: .
    image: nattarklubbin-site
    container_name: nattarklubbin-web
    ports:
      - "8080:80"
    volumes:
      - ./assets:/usr/share/nginx/html/assets:ro
    restart: unless-stopped

  updater:
    image: node:20-alpine
    container_name: nattarklubbin-updater
    working_dir: /app
    environment:
      - UPDATE_INTERVAL_HOURS=72        # how often to check Instagram (default 3 days)
    volumes:
      - ./scripts:/app/scripts:ro
      - ./assets:/app/assets
    command:
      - sh
      - -c
      - >
        INT=$${UPDATE_INTERVAL_HOURS:-72};
        while true; do
          echo "[updater] $$(date -u) checking Instagram...";
          node scripts/update-events.mjs || true;
          echo "[updater] sleeping $${INT}h";
          sleep $$((INT*3600));
        done
    restart: unless-stopped
